spring.application.name=scrum-helper-backend
server.port=${SERVER_PORT:8080}

server.address=${SERVER_ADDRESS:127.0.0.1}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scrum_helper?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:local-development-secret-change-before-deploying}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:86400000}
# app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://anjonghwa.madcamp-kaist.org,https://anjonghwa.madcamp-kaist.org}

app.gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-2.5-flash,gemini-2.0-flash}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
app.gemini.upload-base-url=${GEMINI_UPLOAD_BASE_URL:https://generativelanguage.googleapis.com/upload/v1beta}
